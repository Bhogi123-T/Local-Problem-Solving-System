<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#0d1117"/>
<link rel="manifest" href="manifest.json"/>
<title>CivicAlert v2 — Smart City Problem Reporter</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg:#0d1117; --s1:#161b22; --s2:#21262d; --s3:#30363d;
  --border:#30363d; --border2:#484f58;
  --acc:#3fb950; --acc2:#58a6ff; --acc3:#f78166;
  --warn:#e3b341; --purple:#bc8cff;
  --text:#e6edf3; --muted:#8b949e; --muted2:#6e7681;
  --red:#f85149; --green:#3fb950; --blue:#58a6ff; --orange:#f0883e;
  --font:'Outfit',sans-serif; --mono:'DM Mono',monospace;
  --r:10px; --r2:16px;
  --shadow:0 8px 32px rgba(0,0,0,0.4);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--s1)}
::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px}

.layout{display:flex;height:100vh;overflow:hidden}
.sidebar{
  width:240px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:0;z-index:100;
  transition:width 0.3s;
}
.sidebar-logo{
  padding:20px 16px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
}
.logo-icon{
  width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--acc),#2ea043);
  display:grid;place-items:center;font-size:18px;flex-shrink:0;
}
.logo-name{font-size:18px;font-weight:800;letter-spacing:-0.3px}
.logo-name span{color:var(--acc)}
.logo-ver{font-size:10px;color:var(--muted);font-family:var(--mono);margin-top:1px}
.nav-section{padding:12px 8px 4px;font-size:10px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:1.5px;font-family:var(--mono)}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:9px 12px;margin:2px 8px;
  border-radius:8px;cursor:pointer;transition:all 0.15s;font-size:13px;font-weight:500;
  color:var(--muted);text-decoration:none;position:relative;
}
.nav-item:hover{background:var(--s2);color:var(--text)}
.nav-item.active{background:rgba(63,185,80,0.12);color:var(--acc);font-weight:600}
.nav-item.active::before{content:'';position:absolute;left:-8px;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--acc);border-radius:2px}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;font-family:var(--mono)}
.nav-badge.green{background:var(--acc)}
.sidebar-footer{margin-top:auto;padding:12px;border-top:1px solid var(--border)}
.online-indicator{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);padding:8px 12px}
.dot-online{width:8px;height:8px;border-radius:50%;background:var(--acc);animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}

.main{flex:1;overflow:hidden;display:flex;flex-direction:column}
.topbar{
  padding:0 24px;height:56px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;background:var(--s1);flex-shrink:0;
}
.topbar-title{font-size:16px;font-weight:700;flex:1}
.topbar-title span{color:var(--muted);font-weight:400;font-size:13px;margin-left:8px}
.topbar-actions{display:flex;gap:8px;align-items:center}
.tb-btn{
  padding:6px 14px;border-radius:8px;border:1px solid var(--border);
  background:var(--s2);color:var(--text);font-family:var(--font);font-size:12px;
  font-weight:600;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:6px;
}
.tb-btn:hover{border-color:var(--border2);background:var(--s3)}
.tb-btn.primary{background:var(--acc);border-color:var(--acc);color:#000;font-weight:700}
.tb-btn.primary:hover{background:#45c955;filter:brightness(1.05)}
.content{flex:1;overflow-y:auto;padding:24px}

.page{display:none}
.page.active{display:block}

.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);padding:20px}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:16px;font-family:var(--mono)}

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-box{
  background:var(--s1);border:1px solid var(--border);border-radius:var(--r2);
  padding:18px 20px;position:relative;overflow:hidden;
}
.stat-box::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.stat-box.red::after{background:var(--red)}
.stat-box.yellow::after{background:var(--warn)}
.stat-box.green::after{background:var(--acc)}
.stat-box.blue::after{background:var(--blue)}
.stat-box.purple::after{background:var(--purple)}
.stat-num{font-size:34px;font-weight:800;line-height:1;font-family:var(--mono)}
.stat-lbl{font-size:12px;color:var(--muted);margin-top:6px}
.stat-sub{font-size:11px;margin-top:6px;color:var(--muted2)}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.span2{grid-column:1/-1}

.complaint-item{
  padding:16px;border:1px solid var(--border);border-radius:var(--r);
  margin-bottom:10px;cursor:pointer;transition:all 0.15s;position:relative;
}
.complaint-item:hover{border-color:var(--border2);background:var(--s2)}
.complaint-item.urgent{border-left:3px solid var(--red)}
.complaint-item.medium{border-left:3px solid var(--warn)}
.complaint-item.low{border-left:3px solid var(--acc)}
.ci-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.ci-title{font-size:14px;font-weight:600;line-height:1.4;flex:1}
.ci-meta{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--muted);flex-wrap:wrap}
.type-badge{
  padding:2px 9px;border-radius:12px;font-size:10px;font-weight:700;
  font-family:var(--mono);text-transform:uppercase;flex-shrink:0;
}
.tb-road{background:rgba(88,166,255,0.12);color:var(--blue)}
.tb-water{background:rgba(88,166,255,0.12);color:#79c0ff}
.tb-garbage{background:rgba(63,185,80,0.12);color:var(--acc)}
.tb-electricity{background:rgba(227,179,65,0.12);color:var(--warn)}
.tb-other{background:rgba(139,148,158,0.12);color:var(--muted)}
.priority-badge{
  padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700;font-family:var(--mono);
}
.pb-urgent{background:rgba(248,81,73,0.12);color:var(--red)}
.pb-medium{background:rgba(227,179,65,0.12);color:var(--warn)}
.pb-low{background:rgba(63,185,80,0.12);color:var(--acc)}
.status-track{display:flex;align-items:center;gap:4px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.st-step{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted2)}
.st-step.done{color:var(--acc)}
.st-step.active{color:var(--blue)}
.st-dot{width:8px;height:8px;border-radius:50%;background:currentColor;flex-shrink:0}
.st-line{flex:1;height:1px;background:var(--border);max-width:24px}
.st-line.done{background:var(--acc)}

.form-section{margin-bottom:24px}
.form-section-title{font-size:13px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.form-section-title::after{content:'';flex:1;height:1px;background:var(--border);margin-left:8px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.form-row.single{grid-template-columns:1fr}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-family:var(--mono)}
.form-input{
  background:var(--s2);border:1px solid var(--border);border-radius:var(--r);
  color:var(--text);font-family:var(--font);font-size:14px;padding:10px 14px;
  transition:border-color 0.15s;outline:none;width:100%;
}
.form-input:focus{border-color:var(--acc)}
textarea.form-input{resize:vertical;min-height:90px}
select.form-input option{background:var(--s2)}
.priority-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.p-opt{
  padding:12px 10px;border-radius:var(--r);border:2px solid var(--border);
  cursor:pointer;text-align:center;transition:all 0.15s;background:var(--s2);
}
.p-opt .p-em{font-size:22px;margin-bottom:4px}
.p-opt .p-nm{font-size:12px;font-weight:700}
.p-opt .p-ds{font-size:10px;color:var(--muted);margin-top:2px}
.p-opt.sel-urgent{border-color:var(--red);background:rgba(248,81,73,0.08)}
.p-opt.sel-medium{border-color:var(--warn);background:rgba(227,179,65,0.08)}
.p-opt.sel-low{border-color:var(--acc);background:rgba(63,185,80,0.08)}
.upload-box{
  border:2px dashed var(--border);border-radius:var(--r);padding:24px;
  text-align:center;cursor:pointer;transition:all 0.15s;background:var(--s2);
}
.upload-box:hover{border-color:var(--acc);background:rgba(63,185,80,0.04)}
.upload-box .ub-icon{font-size:28px;margin-bottom:6px}
.upload-box p{font-size:13px;color:var(--muted)}
.upload-preview{
  display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;
}
.up-thumb{
  width:80px;height:80px;border-radius:8px;object-fit:cover;
  border:2px solid var(--border);
}

.submit-btn{
  width:100%;padding:14px;border-radius:var(--r);border:none;
  background:var(--acc);color:#000;font-family:var(--font);font-size:15px;
  font-weight:800;cursor:pointer;transition:all 0.2s;letter-spacing:0.3px;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.submit-btn:hover{filter:brightness(1.08);transform:translateY(-1px);box-shadow:0 6px 20px rgba(63,185,80,0.3)}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
</style>
</head>
<body>
<h1>Loading...</h1>
<script src="app_js_v2.js"></script>
</body>
</html>
